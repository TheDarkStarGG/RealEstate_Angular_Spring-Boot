<div class="access-denied-container">
  <mat-card class="access-denied-card">
    <mat-card-header class="error-header">
      <mat-card-title>Truy cập bị từ chối</mat-card-title>
    </mat-card-header>
    <mat-card-content class="content-container">
      <mat-icon class="error-icon">gpp_bad</mat-icon>
      <h2 class="mat-h2">Bạn không có quyền truy cập tài nguyên này</h2>
      <p class="mat-body-1 secondary-text">
        Vui lòng liên hệ quản trị viên nếu bạn cho rằng đây là lỗi hệ thống.
      </p>
      <div class="action-container">
        <button mat-raised-button color="primary" routerLink="/">
          <mat-icon>home</mat-icon>
          Trở về trang chủ
        </button>
        <button mat-stroked-button color="accent" routerLink="/support">
          <mat-icon>support_agent</mat-icon>
          Liên hệ hỗ trợ
        </button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
