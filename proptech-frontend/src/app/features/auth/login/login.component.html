<div class="login-container">
  <div class="login-card-container">
    <mat-card class="login-card">
      <div class="login-header">
        <h2 class="login-title">Đăng Nhập</h2>
        <p class="login-subtitle">Đăng nhập tài khoản của bạn</p>
      </div>

      <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <!-- Error Message -->
          <mat-error *ngIf="errorMessage" class="error-alert">
            <mat-icon>error_outline</mat-icon>
            {{ errorMessage }}
          </mat-error>

          <!-- Username Field -->
          <div class="input-field">
            <label class="input-label">
              <span class="input-icon">
                <mat-icon>person</mat-icon>
              </span>
              <input
                formControlName="username"
                placeholder="Tên đăng nhập*"
                required
                class="form-input"
              />
            </label>
            <div
              class="input-error"
              *ngIf="
                submitted &&
                f['username'].errors &&
                f['username'].errors['required']
              "
            >
              Tên đăng nhập là bắt buộc
            </div>
          </div>

          <!-- Password Field -->
          <div class="input-field">
            <label class="input-label">
              <span class="input-icon">
                <mat-icon>lock</mat-icon>
              </span>
              <input
                [type]="hidePassword ? 'password' : 'text'"
                formControlName="password"
                placeholder="Mật khẩu*"
                required
                class="form-input"
              />
              <button
                mat-icon-button
                class="toggle-password"
                (click)="hidePassword = !hidePassword"
                [attr.aria-label]="'Ẩn/hiện mật khẩu'"
                type="button"
              >
                <mat-icon>{{
                  hidePassword ? "visibility_off" : "visibility"
                }}</mat-icon>
              </button>
            </label>
            <div
              class="input-error"
              *ngIf="
                submitted &&
                f['password'].errors &&
                f['password'].errors['required']
              "
            >
              Mật khẩu là bắt buộc
            </div>
          </div>

          <!-- Remember Me -->
          <div class="remember-forgot-row">
            <label class="remember-me-label">
              <input
                type="checkbox"
                formControlName="rememberMe"
                class="remember-me-checkbox"
              />
              <span>Ghi nhớ đăng nhập</span>
            </label>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="login-button" [disabled]="loading">
            <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
            <span *ngIf="!loading">Đăng Nhập</span>
          </button>

          <!-- Register Link -->
          <div class="register-link-container">
            <span>Bạn chưa có tài khoản?</span>
            <a routerLink="/auth/register" class="register-link"
              >Đăng ký ngay</a
            >
          </div>
        </form>
      </mat-card-content>
    </mat-card>
  </div>
</div>
